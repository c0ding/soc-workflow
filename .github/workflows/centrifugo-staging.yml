name: staging-centrifugo

on:
    repository_dispatch:
        types: [staging-centrifugo]
    workflow_dispatch:
        inputs:
            task_desired_count:
                description: "任务数量"
                required: true
                default: "2"
                type: choice
                options:
                    - "0"
                    - "1"
                    - "2"
                    - "3"
                    - "4"
            task_cpu_setting:
                description: "CPU设置"
                required: true
                default: "1024"
                type: choice
                options:
                    - "512" # 0.5 vCPU
                    - "1024" # 1 vCPU
                    - "2048" # 2 vCPU
                    - "4096" # 4 vCPU
            task_memory_setting:
                description: "内存设置"
                required: true
                default: "2048"
                type: choice
                options:
                    - "1024" # 1 GB
                    - "2048" # 2 GB
                    - "4096" # 4 GB
                    - "8192" # 8 GB

jobs:
    call-deployment-in-local-repo:
        uses: ./.github/workflows/build-node-task.yml
        with:
            AWS_REGION: us-east-2
            ECR_REPOSITORY: centrifugo
            DEPLOYMENT_ENV: staging
            APPLICATION_NAME: centrifugo-v1
            ECS_CLUSTER: centrifugo-staging
            SECURITY_GROUP_IDS_SSM: /staging/security-groups
            SUBNET_IDS_SSM: /staging/subnet-ids
            VPC_ID_SSM: /staging/vpc-id
            SNS_TO_LARK_LAMBDA_ARN: /staging/lambda/sns-to-lark
            CERERTIFICATE_ARN: /staging/certificate
            ECS_EXECUTION_ROLE_ARN: /staging/ecs-execution-role
            REPO_NAME: centrifugo
            BRANCH_NAME: main
            CF: .github/workflows/awscf/centrifugo.yml

            # 发布配置
            TASK_DESIRED_COUNT: ${{ github.event.inputs.task_desired_count || '2' }}
            TASK_CPU_SETTING: ${{ github.event.inputs.task_cpu_setting || '1024' }}
            TASK_MEMORY_SETTING: ${{ github.event.inputs.task_memory_setting || '2048' }}
            APP_PORT: "8000"
        secrets:
            PAT: ${{ secrets.PAT }}
            DEPLOYMENT_AWS_ACCESS_KEY_ID: ${{ secrets.DEPLOYMENT_AWS_ACCESS_KEY_ID_STAGING }}
            DEPLOYMENT_AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOYMENT_AWS_SECRET_ACCESS_KEY_STAGING }}
            