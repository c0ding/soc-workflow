        Default: /nfp/BSC_ADDRESS_WITHDRAW_WALLET_ID
    BscAddrWithdrawWalletAddr:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/BSC_ADDRESS_WITHDRAW_WALLET_ADDRESS
    EthAddrSpenderWalletId:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/ETH_ADDRESS_SPENDER_WALLET_ID
    EthAddrSpenderWalletAddr:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/ETH_ADDRESS_SPENDER_WALLET_ADDRESS
    EthAddrWithDrawWalletId:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/ETH_ADDRESS_WITHDRAW_WALLET_ID
    EthAddrWithDrawWalletAddr:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/ETH_ADDRESS_WITHDRAW_WALLET_ADDRESS
    SolanaAddrSenderWalletId:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/SOLANA_ADDRESS_SPENDER_WALLET_ID
    SolanaAddrSenderWalletAddr:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/SOLANA_ADDRESS_SPENDER_WALLET_ADDRESS
    SolanaAddrWithdrawWalletId:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/SOLANA_ADDRESS_WITHDRAW_WALLET_ID
    SolanaAddrWithdrawWalletAddr:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/SOLANA_ADDRESS_WITHDRAW_WALLET_ADDRESS
    SolanaNetwork:
        Type: String
        Default: 'mainnet'
    PrivyAppId:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/PRIVY_APP_ID
    PrivyAppSecret:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/PRIVY_APP_SECRET
    PrivyAuthorization:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/PRIVY_AUTHORIZATION_PRIVATE_KEY
    AppEnv:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfp/APP_ENV
    KafkaUserName:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/KAFKA_USERNAME
    KafkaPassword:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/KAFKA_PASSWORD
    KafkaSecurityProtocol:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/KAFKA_SECURITY_PROTOCOL
    KafkaSaslMechanism:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/KAFKA_SASL_MECHANISM
    KafkaMessageEd25519PrivateKey:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/ENGINE_PRIVATE_KEY
    PredictionMarketApiKey:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/PREDICTION_MARKET_API_KEY






Resources:
    ECSService:
        Type: 'AWS::ECS::Service'
        Properties:
            Cluster: !Ref ECSClusterName
            CapacityProviderStrategy:
                - CapacityProvider: FARGATE
                  Base: 0
                  Weight: 1
            TaskDefinition: !Ref TaskDefinition
            ServiceName: !Sub ${ApplicationName}-${EnvName}
            DesiredCount: !Ref TaskDesiredCount
            EnableExecuteCommand: true
            LoadBalancers:
                - ContainerName: !Sub ${ApplicationName}-${EnvName}
                  ContainerPort: !Ref AppPort
                  TargetGroupArn: !Ref TargetGroup
                - ContainerName: !Sub ${ApplicationName}-${EnvName}
                  ContainerPort: !Ref NewAppPort
                  TargetGroupArn: !Ref NodeExportTargetGroup
            HealthCheckGracePeriodSeconds: '60'
            NetworkConfiguration:
                AwsvpcConfiguration:
                    AssignPublicIp: ENABLED
                    SecurityGroups: !Ref SecurityGroupIDs
                    Subnets: !Ref SubnetIDs
            DeploymentConfiguration:
                MaximumPercent: 200
                MinimumHealthyPercent: 100
                DeploymentCircuitBreaker:
                    Enable: true    
                    Rollback: true
            DeploymentController:
                Type: ECS
        DependsOn:
            - Listener
            - NodeExportListener

    LoadBalancer:
        Type: 'AWS::ElasticLoadBalancingV2::LoadBalancer'
        Properties:
            Name: !Sub ${ApplicationName}-${EnvName}-alb
            SecurityGroups: !Ref SecurityGroupIDs
            Subnets: !Ref SubnetIDs
            Type: application
            Scheme: internal
    TargetGroup:
        Type: 'AWS::ElasticLoadBalancingV2::TargetGroup'
        Properties:
            VpcId: !Ref VpcID
            Protocol: HTTP
            Port: '443'
            HealthCheckPath: /health
            TargetType: ip
    Listener:
        Type: 'AWS::ElasticLoadBalancingV2::Listener'
        Properties:
            DefaultActions:
                - TargetGroupArn: !Ref TargetGroup
                  Type: forward
            LoadBalancerArn: !Ref LoadBalancer
            Port: '80'
            Protocol: HTTP

    NodeExportLoadBalancer:
        Type: 'AWS::ElasticLoadBalancingV2::LoadBalancer'
        Properties:
            Name: !Sub ${ApplicationName}-${EnvName}-nodeexport
            SecurityGroups: !Ref SecurityGroupIDs
            Subnets: !Ref SubnetIDs
            Type: application
            Scheme: internal

    NodeExportTargetGroup:
        Type: 'AWS::ElasticLoadBalancingV2::TargetGroup'
        Properties:
            VpcId: !Ref VpcID
            Protocol: HTTP
            Port: '80'
            HealthCheckPath: /metrics
            TargetType: ip

    NodeExportListener:
        Type: 'AWS::ElasticLoadBalancingV2::Listener'
        Properties:
            DefaultActions:
                - TargetGroupArn: !Ref NodeExportTargetGroup
                  Type: forward
            LoadBalancerArn: !Ref NodeExportLoadBalancer
            Port: '9100' # 更新为容器端口
            Protocol: HTTP

    TaskDefinition:
        Type: AWS::ECS::TaskDefinition
        Properties:
            Family: !Sub ${ApplicationName}-${EnvName}
            Cpu: !Ref TaskCpuSetting
            Memory: !Ref TaskMemorySetting
            NetworkMode: awsvpc
            RequiresCompatibilities:
                - FARGATE
            ExecutionRoleArn: !Ref ExecutionRoleArn
            TaskRoleArn: !Ref ExecutionRoleArn
            ContainerDefinitions:
                - Name: !Sub ${ApplicationName}-${EnvName}
                  Image: !Ref DockerImageUrl
                  Environment:
                      - Name: BSC_ADDRESS_SPENDER
                        Value: !Ref BscAddressSpender
                      - Name: BSC_ADDRESS_WITHDRAW
                        Value: !Ref BscAddressWithdraw
                      - Name: BSC_CONTRACT_VAULT
                        Value: !Ref BscContractVAault
                      - Name: BSC_CONTRACT_BRIDGE
                        Value: !Ref BscContractBridge
                      - Name: BSC_CONTRACT_PRIVY_ADMIN
                        Value: !Ref BscContractPrivyAdmin
                      - Name: BSC_CONTRACT_PRIVY_LOGICAL
                        Value: !Ref BscContractPrivyLogical
                      - Name: BSC_CONTRACT_USDT
                        Value: !Ref BscContractUsdt
                      - Name: BSC_CHAIN_ID
                        Value: !Ref BscChainId
                      - Name: BSC_RPC_URL
                        Value: !Ref BscRpcUrl
                      - Name: BSC_WSS_URL
                        Value: !Ref BscWssUrl
                      - Name: SOCX_ADDRESS_SPENDER
                        Value: !Ref SocxAddressSpender
                      - Name: SOCX_CONTRACT_ADAPTER
                        Value: !Ref SocxContractAdapter
                      - Name: SOCX_CONTRACT_MARKET
                        Value: !Ref SocxContractMarket
                      - Name: SOCX_CONTRACT_USDT
                        Value: !Ref SocxContractUsdt
                      - Name: SOCX_RPC_URL
                        Value: !Ref SocxRpcUrl
                      - Name: SOCX_WSS_URL
                        Value: !Ref SocxWssUrl
                      - Name: INTERNAL_PREDICTION_MARKET_URL
                        Value: !Ref InternalPredictionMarketUrl
                      - Name: INTERNAL_USER_URL
                        Value: !Ref InternalUserUrl
                      - Name: KAFKA_BROKERS
                        Value: !Ref KafkaBrokers
                      - Name: SOCX_CHAIN_ID
                        Value: !Ref SocxChainId
                      - Name: AWS_ACCESS_KEY_ID
                        Value: !Ref AwsAccessKeyId
                      - Name: AWS_SECRET_ACCESS_KEY
                        Value: !Ref AwsSecretAccessKey
                      - Name: DATABASE_URL
                        Value: !Ref DatabaseUrl
                      - Name: REDIS_URL
                        Value: !Ref RedisUrl
                      - Name: SOLANA_ADDRESS_SPENDER
                        Value: !Ref SolanaAddressSpender
                      - Name: SOLANA_ADDRESS_WITHDRAW
                        Value: !Ref SolanaAddressWithdraw
                      - Name: SOLANA_CONTRACT_USDT
                        Value: !Ref SolanaContractUsdt
                      - Name: SOLANA_CONTRACT_VAULT
                        Value: !Ref SolanaContractVault
                      - Name: SOLANA_RPC_URL
                        Value: !Ref SolanaRpcUrl
                      - Name: SOLANA_WSS_URL
                        Value: !Ref SolanaWssUrl
                      - Name: WEBHOOK_URL_OUTVAULT
                        Value: !Ref WebHookUrlOutvault
                      - Name: SAFE_API_KEY
                        Value: !Ref SafeApiKey
                      - Name: SAFE_ADDRESS
                        Value: !Ref SafeAddress
                      - Name: SQUADS_ADDRESS
                        Value: !Ref SquadsAddress
                      - Name: X_API
                        Value: !Ref XApi
                      - Name: ETH_ADDRESS_SPENDER
                        Value: !Ref EthAddressSpender
                      - Name: ETH_ADDRESS_WITHDRAW
                        Value: !Ref EthAddressWithdraw
                      - Name: ETH_CONTRACT_PRIVY_ADMIN
                        Value: !Ref EthContractPrivyAdmin
                      - Name: ETH_CONTRACT_PRIVY_LOGICAL
                        Value: !Ref EthContractPrivyLogical
                      - Name: ETH_CONTRACT_USDT
                        Value: !Ref EthContractUsdt
                      - Name: ETH_CONTRACT_VAULT
                        Value: !Ref EthContractVault
                      - Name: ETH_RPC_URL
                        Value: !Ref EthRpcUrl
                      - Name: ETH_WSS_URL
                        Value: !Ref EthWssUrl
                      - Name: ETH_CHAIN_ID
                        Value: !Ref EthChainId
                      - Name: PASS_MINT_CONTRACT_ADDRESS
                        Value: !Ref PassMintContractAddress
                      - Name: SOC_MANAGER_CONTRACT_ADDRESS
                        Value: !Ref SocManagerContractAddress
                      - Name: BSC_CONTRACT_PASS
                        Value: !Ref BscContractPass
                      - Name: BSC_CONTRACT_SOC
                        Value: !Ref BscContractSoc
                      - Name: BSC_CONTRACT_SOC_MANAGER
                        Value: !Ref BscContractSocManager
                      - Name: BSC_DELEGATED_ALLOWLIST
                        Value: !Ref BscDelegatedAllowlist
                      - Name: ETH_DELEGATED_ALLOWLIST
                        Value: !Ref EthDelegatedAllowlist
                      - Name: SOLANA_DELEGATED_ALLOWLIST
                        Value: !Ref SolanaDelegatedAllowlist
                      - Name: APP_ENV
                        Value: !Ref AppEnv


                      - Name: BSC_ADDRESS_SPENDER_WALLET_ID
                        Value: !Ref BscAddrSpenderWalletId
                      - Name: BSC_ADDRESS_SPENDER_WALLET_ADDRESS
                        Value: !Ref BscAddrSpenderWalletAddr
                      - Name: BSC_ADDRESS_WITHDRAW_WALLET_ID
                        Value: !Ref BscAddrWithdrawWalletId
                      - Name: BSC_ADDRESS_WITHDRAW_WALLET_ADDRESS
                        Value: !Ref BscAddrWithdrawWalletAddr

                      - Name: ETH_ADDRESS_SPENDER_WALLET_ID
                        Value: !Ref EthAddrSpenderWalletId
                      - Name: ETH_ADDRESS_SPENDER_WALLET_ADDRESS
                        Value: !Ref EthAddrSpenderWalletAddr
                      - Name: ETH_ADDRESS_WITHDRAW_WALLET_ID
                        Value: !Ref EthAddrWithDrawWalletId
                      - Name: ETH_ADDRESS_WITHDRAW_WALLET_ADDRESS
                        Value: !Ref EthAddrWithDrawWalletAddr

                      - Name: SOLANA_ADDRESS_SPENDER_WALLET_ID
                        Value: !Ref SolanaAddrSenderWalletId
                      - Name: SOLANA_ADDRESS_SPENDER_WALLET_ADDRESS
                        Value: !Ref SolanaAddrSenderWalletAddr
                      - Name: SOLANA_ADDRESS_WITHDRAW_WALLET_ID
                        Value: !Ref SolanaAddrWithdrawWalletId
                      - Name: SOLANA_ADDRESS_WITHDRAW_WALLET_ADDRESS
                        Value: !Ref SolanaAddrWithdrawWalletAddr
                      - Name: SOLANA_NETWORK
                        Value: !Ref SolanaNetwork

                      - Name: PRIVY_APP_ID
                        Value: !Ref PrivyAppId
                      - Name: PRIVY_APP_SECRET
                        Value: !Ref PrivyAppSecret
                      - Name: PRIVY_AUTHORIZATION_PRIVATE_KEY
                        Value: !Ref PrivyAuthorization
                      - Name: APP_ENV
                        Value: !Ref AppEnv

                      - Name: KAFKA_USERNAME
                        Value: !Ref KafkaUserName
                      - Name: KAFKA_PASSWORD
                        Value: !Ref KafkaPassword
                      - Name: KAFKA_SECURITY_PROTOCOL
                        Value: !Ref KafkaSecurityProtocol
                      - Name: KAFKA_SASL_MECHANISM
                        Value: !Ref KafkaSaslMechanism
                      - Name: KAFKA_MESSAGE_ED25519_PRIVATE_KEY
                        Value: !Ref KafkaMessageEd25519PrivateKey
                      - Name: PREDICTION_MARKET_API_KEY
                        Value: !Ref PredictionMarketApiKey






                  PortMappings:
                      - ContainerPort: !Ref AppPort
                        HostPort: !Ref AppPort
                      - ContainerPort: !Ref NewAppPort
                        HostPort: !Ref NewAppPort
                  LogConfiguration:
                      LogDriver: 'awslogs'
                      Options:
                          awslogs-create-group: true
                          awslogs-group: !Sub ${ApplicationName}-${EnvName}
                          awslogs-region: !Ref 'AWS::Region'
                          awslogs-stream-prefix: ecs

    TooManyHttpCodeElb5XXCountAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub 'TooMany_HTTPCode_ELB_5XX_Count_Alarm-${EnvName}-${ApplicationName}'
            AlarmDescription: !Sub 'TooMany_HTTPCode_ELB_5XX_Count_Alarm of ${ApplicationName} in environment ${EnvName}'
            Namespace: AWS/ApplicationELB
            MetricName: HTTPCode_ELB_5XX_Count
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt LoadBalancer.LoadBalancerFullName
            Statistic: Sum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    TargetResponseTimeTooSlowAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub 'TargetResponseTime-too-slow-${EnvName}-${ApplicationName}'
            AlarmDescription: !Sub 'TargetResponseTime is too slow for ${ApplicationName} in environment ${EnvName}'
            Namespace: AWS/ApplicationELB
            MetricName: TargetResponseTime
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt LoadBalancer.LoadBalancerFullName
            Statistic: Maximum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 10
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    HealthyHostCountTooLowAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub 'HealthyHostCountTooLow-alarm-${EnvName}-${ApplicationName}'
            AlarmDescription: !Sub 'The HealthyHostCount is too low for ${ApplicationName} in environment ${EnvName}'
            Namespace: AWS/ApplicationELB
            MetricName: HealthyHostCount
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt LoadBalancer.LoadBalancerFullName
                - Name: TargetGroup
                  Value: !GetAtt TargetGroup.TargetGroupFullName
            Statistic: Minimum
            Period: 180
            EvaluationPeriods: 1
            Threshold: !Ref TaskDesiredCount
            ComparisonOperator: LessThanThreshold
            TreatMissingData: breaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    LarkTopic:
        Type: AWS::SNS::Topic
        Properties:
            TopicName: !Sub ${ApplicationName}-${EnvName}
            Subscription:
                - Endpoint: !Ref SnsToLarkLambda
                  Protocol: 'LAMBDA'

    # ASG setting begin
    AutoScalingRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: '2012-10-17'
                Statement:
                    - Effect: Allow
                      Principal:
                          Service:
                              - ecs-tasks.amazonaws.com
                      Action:
                          - 'sts:AssumeRole'
            Path: '/'
            Policies:
                - PolicyName: allow-ecs-cw-scaling
                  PolicyDocument:
                      Version: '2012-10-17'
                      Statement:
                          - Effect: Allow
                            Action:
                                - ecs:DescribeServices
                                - ecs:UpdateService
                                - cloudwatch:DeleteAlarms
                                - cloudwatch:DescribeAlarms
                                - cloudwatch:PutMetricAlarm
                            Resource: '*'
    AutoScalingTarget:
        Type: AWS::ApplicationAutoScaling::ScalableTarget
        Properties:
            MinCapacity: !Ref TaskDesiredCount
            MaxCapacity: 10
            ResourceId: !Join ['/', [service, !Ref ECSClusterName, !GetAtt ECSService.Name]]
            ScalableDimension: ecs:service:DesiredCount
            ServiceNamespace: ecs
            RoleARN: !GetAtt AutoScalingRole.Arn
    AutoScalingPolicyForCPU:
        Type: AWS::ApplicationAutoScaling::ScalingPolicy
        Properties:
            PolicyName: ecs-cpu-utilization-ScalingPolicy
            PolicyType: TargetTrackingScaling
            ScalingTargetId: !Ref AutoScalingTarget
            TargetTrackingScalingPolicyConfiguration:
                PredefinedMetricSpecification:
                    PredefinedMetricType: ECSServiceAverageCPUUtilization
                ScaleInCooldown: 300
                ScaleOutCooldown: 120
                TargetValue: 70.0
    AutoScalingPolicyForMemory:
        Type: AWS::ApplicationAutoScaling::ScalingPolicy
        Properties:
            PolicyName: ecs-memory-utilization-ScalingPolicy
            PolicyType: TargetTrackingScaling
            ScalingTargetId: !Ref AutoScalingTarget
            TargetTrackingScalingPolicyConfiguration:
                PredefinedMetricSpecification:
                    PredefinedMetricType: ECSServiceAverageMemoryUtilization
                ScaleInCooldown: 300
                ScaleOutCooldown: 120
                TargetValue: 75.0
# ASG setting end

Outputs:
    ClusterName:
        Description: The cluster used to create the service.
