AWSTemplateFormatVersion: 2010-09-09
Description: The template used to create an ECS Service.
Parameters:
    CertificateArn:
        Type: AWS::SSM::Parameter::Value<AWS::CertificateManager::Certificate::ARN>
    ExecutionRoleArn:
        Type: AWS::SSM::Parameter::Value<AWS::IAM::Role::ARN>
    ECSClusterName:
        Type: String
    ApplicationName:
        Type: String
    EnvName:
        Type: String
    SecurityGroupIDs:
        Type: AWS::SSM::Parameter::Value<List<AWS::EC2::SecurityGroup::Id>>
    SubnetIDs:
        Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
    VpcID:
        Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    DockerImageUrl:
        Type: String
    TaskDesiredCount:
        Type: Number
        Default: 1
    TaskCpuSetting:
        Type: Number
        Default: 2048
    TaskMemorySetting:
        Type: Number
        Default: 4096
    AppPort:
        Type: Number
        Default: 8502
    SnsToLarkLambda:
        Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
    BucketName:
        Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
        Default: /mm/streamlit/BUCKET_NAME
    AwsAccessKeyId:
        Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
        Default: /mm/streamlit/AWS_ACCESS_KEY_ID
    AwsAccessKeySecret:
        Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
        Default: /mm/streamlit/AWS_SECRET_ACCESS_KEY
    AwsRagion:
        Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
        Default: /mm/streamlit/AWS_REGION
    S3EndPoint:
        Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
        Default: /mm/streamlit/S3_ENDPOINT_URL

Resources:
    ECSService:
        Type: "AWS::ECS::Service"
        Properties:
            Cluster: !Ref ECSClusterName
            CapacityProviderStrategy:
                - CapacityProvider: FARGATE
                  Base: 0
                  Weight: 1
            TaskDefinition: !Ref TaskDefinition
            ServiceName: !Sub ${ApplicationName}-${EnvName}
            DesiredCount: !Ref TaskDesiredCount
            EnableExecuteCommand: true
            LoadBalancers:
                - ContainerName: !Sub ${ApplicationName}-${EnvName}
                  ContainerPort: !Ref AppPort
                  TargetGroupArn: !Ref TargetGroup
            HealthCheckGracePeriodSeconds: "60"
            NetworkConfiguration:
                AwsvpcConfiguration:
                    AssignPublicIp: ENABLED
                    SecurityGroups: !Ref SecurityGroupIDs
                    Subnets: !Ref SubnetIDs
            DeploymentConfiguration:
                # 200 Quick but maybe the service will stop
                # 125 Want to update services healthier
                MaximumPercent: 200
                MinimumHealthyPercent: 100
                DeploymentCircuitBreaker:
                    Enable: true    
                    Rollback: true
            DeploymentController:
                Type: ECS
        DependsOn:
            - Listener

    LoadBalancer:
        Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
        Properties:
            Name: !Sub ${ApplicationName}
            SecurityGroups: !Ref SecurityGroupIDs
            Subnets: !Ref SubnetIDs
            Type: application
            Scheme: internet-facing
    TargetGroup:
        Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
        Properties:
            VpcId: !Ref VpcID
            Protocol: HTTP
            Port: "443"
            HealthCheckPath: /_stcore/health
            TargetType: ip
    Listener:
        Type: "AWS::ElasticLoadBalancingV2::Listener"
        Properties:
            DefaultActions:
                - TargetGroupArn: !Ref TargetGroup
                  Type: forward
            LoadBalancerArn: !Ref LoadBalancer
            Port: "80"
            Protocol: HTTP
    Listener:
        Type: 'AWS::ElasticLoadBalancingV2::Listener'
        Properties:
            Certificates:
                - CertificateArn: !Ref CertificateArn
            DefaultActions:
                - TargetGroupArn: !Ref TargetGroup
                  Type: forward
            LoadBalancerArn: !Ref LoadBalancer
            Port: '443'
            Protocol: HTTPS

    TaskDefinition:
        Type: AWS::ECS::TaskDefinition
        Properties:
            Family: !Sub ${ApplicationName}-${EnvName}
            Cpu: !Ref TaskCpuSetting
            Memory: !Ref TaskMemorySetting
            NetworkMode: awsvpc
            RequiresCompatibilities:
                - FARGATE
            ExecutionRoleArn: !Ref ExecutionRoleArn
            TaskRoleArn: !Ref ExecutionRoleArn
            ContainerDefinitions:
                - Name: !Sub ${ApplicationName}-${EnvName}
                  Image: !Ref DockerImageUrl
                  Environment:
                      - Name: BUCKET_NAME
                        Value: !Ref BucketName
                      - Name: AWS_ACCESS_KEY_ID
                        Value: !Ref AwsAccessKeyId
                      - Name: AWS_SECRET_ACCESS_KEY
                        Value: !Ref AwsAccessKeySecret
                      - Name: AWS_REGION
                        Value: !Ref AwsRagion
                      - Name: S3_ENDPOINT_URL
                        Value: !Ref S3EndPoint

                  PortMappings:
                      - ContainerPort: !Ref AppPort
                        HostPort: !Ref AppPort
                  LogConfiguration:
                      LogDriver: "awslogs"
                      Options:
                          awslogs-create-group: true
                          awslogs-group: !Sub ${ApplicationName}-${EnvName}
                          awslogs-region: !Ref "AWS::Region"
                          awslogs-stream-prefix: ecs

    TooManyHttpCodeElb5XXCountAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm of ${ApplicationName} in environment ${EnvName}"
            Namespace: AWS/ApplicationELB
            MetricName: HTTPCode_ELB_5XX_Count
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt LoadBalancer.LoadBalancerFullName
            Statistic: Sum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    TargetResponseTimeTooSlowAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "TargetResponseTime-too-slow-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "TargetResponseTime is too slow for ${ApplicationName} in environment ${EnvName}"
            Namespace: AWS/ApplicationELB
            MetricName: TargetResponseTime
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt LoadBalancer.LoadBalancerFullName
            Statistic: Maximum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 10
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    HealthyHostCountTooLowAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "HealthyHostCountTooLow-alarm-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "The HealthyHostCount is too low for ${ApplicationName} in environment ${EnvName}"
            Namespace: AWS/ApplicationELB
            MetricName: HealthyHostCount
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt LoadBalancer.LoadBalancerFullName
                - Name: TargetGroup
                  Value: !GetAtt TargetGroup.TargetGroupFullName
            Statistic: Minimum
            Period: 180
            EvaluationPeriods: 1
            Threshold: !Ref TaskDesiredCount
            ComparisonOperator: LessThanThreshold
            TreatMissingData: breaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    DbErrorAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "DB-Error-alarm-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "The DB Error is greater than zero for ${ApplicationName} in environment ${EnvName}"
            Namespace: !Ref ApplicationName
            MetricName: DBError
            Dimensions:
                - Name: Env
                  Value: !Ref EnvName
            Statistic: Sum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    RedisUpdateErrorAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "Redis-Update-Error-alarm-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "Redis cache update error alarm for ${ApplicationName} in environment ${EnvName}"
            Namespace: !Ref ApplicationName
            MetricName: RedisUpdateError
            Dimensions:
                - Name: Env
                  Value: !Ref EnvName
            Statistic: Sum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    LarkTopic:
        Type: AWS::SNS::Topic
        Properties:
            TopicName: !Sub ${ApplicationName}-${EnvName}
            Subscription:
                - Endpoint: !Ref SnsToLarkLambda
                  Protocol: "LAMBDA"

    # ASG setting begin
    AutoScalingRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: "2012-10-17"
                Statement:
                    - Effect: Allow
                      Principal:
                          Service:
                              - ecs-tasks.amazonaws.com
                      Action:
                          - "sts:AssumeRole"
            Path: "/"
            Policies:
                - PolicyName: allow-ecs-cw-scaling
                  PolicyDocument:
                      Version: "2012-10-17"
                      Statement:
                          - Effect: Allow
                            Action:
                                - ecs:DescribeServices
                                - ecs:UpdateService
                                - cloudwatch:DeleteAlarms
                                - cloudwatch:DescribeAlarms
                                - cloudwatch:PutMetricAlarm
                            Resource: "*"
    AutoScalingTarget:
        Type: AWS::ApplicationAutoScaling::ScalableTarget
        Properties:
            MinCapacity: !Ref TaskDesiredCount
            MaxCapacity: 2
            ResourceId:
                !Join [
                    "/",
                    [service, !Ref ECSClusterName, !GetAtt ECSService.Name],
                ]
            ScalableDimension: ecs:service:DesiredCount
            ServiceNamespace: ecs
            RoleARN: !GetAtt AutoScalingRole.Arn
    AutoScalingPolicyForCPU:
        Type: AWS::ApplicationAutoScaling::ScalingPolicy
        Properties:
            PolicyName: ecs-cpu-utilization-ScalingPolicy
            PolicyType: TargetTrackingScaling
            ScalingTargetId: !Ref AutoScalingTarget
            TargetTrackingScalingPolicyConfiguration:
                PredefinedMetricSpecification:
                    PredefinedMetricType: ECSServiceAverageCPUUtilization
                ScaleInCooldown: 300
                ScaleOutCooldown: 120
                TargetValue: 70.0
    AutoScalingPolicyForMemory:
        Type: AWS::ApplicationAutoScaling::ScalingPolicy
        Properties:
            PolicyName: ecs-memory-utilization-ScalingPolicy
            PolicyType: TargetTrackingScaling
            ScalingTargetId: !Ref AutoScalingTarget
            TargetTrackingScalingPolicyConfiguration:
                PredefinedMetricSpecification:
                    PredefinedMetricType: ECSServiceAverageMemoryUtilization
                ScaleInCooldown: 300
                ScaleOutCooldown: 120
                TargetValue: 85.0
# ASG setting end

Outputs:
    ClusterName:
        Description: The cluster used to create the service.
        Value: !Ref ECSClusterName
    ECSService:
        Description: The created service.
        Value: !Ref ECSService
    LoadBalancer:
        Description: The created load balancer.
        Value: !Ref LoadBalancer
    Listener:
        Description: The created listener.
        Value: !Ref Listener
    TargetGroup:
        Description: The created target group.
        Value: !Ref TargetGroup
    LarkTopic:
        Description: The created Lark Topic.
        Value: !Ref LarkTopic
