AWSTemplateFormatVersion: 2010-09-09
Description: The template used to create an ECS Service.
Parameters:
    CertificateArn:
        Type: AWS::SSM::Parameter::Value<AWS::CertificateManager::Certificate::ARN>
    ExecutionRoleArn:
        Type: AWS::SSM::Parameter::Value<AWS::IAM::Role::ARN>
    ECSClusterName:
        Type: String
    ApplicationName:
        Type: String
    EnvName:
        Type: String
    SecurityGroupIDs:
        Type: AWS::SSM::Parameter::Value<List<AWS::EC2::SecurityGroup::Id>>
    SubnetIDs:
        Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
    VpcID:
        Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    DockerImageUrl:
        Type: String
    TaskDesiredCount:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /ecs/taskcount
    TaskCpuSetting:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /ecs/go/TaskCpu
    TaskMemorySetting:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /ecs/go/TaskMemory
    AppPort:
        Type: Number
        Default: 3000
    SnsToLarkLambda:
        Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
    ContainerEnvConfig:
        Type: String
    AppEnv:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /admin/APP_ENV
    NodeTlsRejectUnauthorized:
        Type: Number
        Default: 0
    DatabaseUrl:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfpm/DATABASE_URL
    KafkaBrokers:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /admin-be/KAFKA_BROKERS
    KafkaUserName:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/KAFKA_USERNAME
    KafkaPassword:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pme/KAFKA_PASSWORD
    RedisUrl:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /admin-be/REDIS_URL_OF_ADMIN
    OpensearchNode:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pm-events/ES_NODE
    OpensearchUsername:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pm-events/ES_USERNAME
    OpensearchPassword:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /pm-events/ES_PASSWORD
    S3Endpoint:
        Type: AWS::SSM::Parameter::Value<String>
        Default: /nfpm/S3_ENDPOINT
    


Resources:
    ECSService:
        Type: "AWS::ECS::Service"
        Properties:
            Cluster: !Ref ECSClusterName
            CapacityProviderStrategy:
                - CapacityProvider: FARGATE
                  Base: 0
                  Weight: 1
            TaskDefinition: !Ref TaskDefinition
            ServiceName: !Sub ${ApplicationName}-${EnvName}
            DesiredCount: !Ref TaskDesiredCount
            EnableExecuteCommand: true
            LoadBalancers:
                - ContainerName: !Sub ${ApplicationName}-${EnvName}
                  ContainerPort: !Ref AppPort
                  TargetGroupArn: !Ref InternalTargetGroup
            HealthCheckGracePeriodSeconds: "60"
            NetworkConfiguration:
                AwsvpcConfiguration:
                    AssignPublicIp: ENABLED
                    SecurityGroups: !Ref SecurityGroupIDs
                    Subnets: !Ref SubnetIDs
            DeploymentConfiguration:
                MaximumPercent: 200
                MinimumHealthyPercent: 100
                DeploymentCircuitBreaker:
                    Enable: true    
                    Rollback: true
            DeploymentController:
                Type: ECS
        DependsOn:
            - InternalListener
    InternalLoadBalancer:
        Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
        Properties:
            Name: !Sub ${ApplicationName}-${EnvName}-internal
            SecurityGroups: !Ref SecurityGroupIDs
            Subnets: !Ref SubnetIDs
            Type: application
            Scheme: internal

    InternalTargetGroup:
        Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
        Properties:
            VpcId: !Ref VpcID
            Protocol: HTTP
            Port: "80"
            HealthCheckPath: /health
            TargetType: ip

    InternalListener:
        Type: "AWS::ElasticLoadBalancingV2::Listener"
        Properties:
            DefaultActions:
                - TargetGroupArn: !Ref InternalTargetGroup
                  Type: forward
            LoadBalancerArn: !Ref InternalLoadBalancer
            Port: "80"
            Protocol: HTTP

    TaskDefinition:
        Type: AWS::ECS::TaskDefinition
        Properties:
            Family: !Sub ${ApplicationName}-${EnvName}
            Cpu: !Ref TaskCpuSetting
            Memory: !Ref TaskMemorySetting
            NetworkMode: awsvpc
            RequiresCompatibilities:
                - FARGATE
            ExecutionRoleArn: !Ref ExecutionRoleArn
            TaskRoleArn: !Ref ExecutionRoleArn
            ContainerDefinitions:
                - Name: !Sub ${ApplicationName}-${EnvName}
                  Image: !Ref DockerImageUrl
                  Environment:
                      - Name: APP_ENV
                        Value: !Ref AppEnv
                      - Name: NODE_TLS_REJECT_UNAUTHORIZED
                        Value: !Ref NodeTlsRejectUnauthorized
                      - Name: DATABASE_URL
                        Value: !Ref DatabaseUrl
                      - Name: KAFKA_BROKERS
                        Value: !Ref KafkaBrokers
                      - Name: KAFKA_PASSWORD
                        Value: !Ref KafkaPassword
                      - Name: KAFKA_USERNAME
                        Value: !Ref KafkaUserName
                      - Name: REDIS_URL
                        Value: !Ref RedisUrl
                      - Name: OPENSEARCH_NODE
                        Value: !Ref OpensearchNode
                      - Name: OPENSEARCH_USERNAME
                        Value: !Ref OpensearchUsername
                      - Name: OPENSEARCH_PASSWORD
                        Value: !Ref OpensearchPassword
                      - Name: S3_ENDPOINT
                        Value: !Ref S3Endpoint

                      




                  PortMappings:
                      - ContainerPort: !Ref AppPort
                        HostPort: !Ref AppPort
                  LogConfiguration:
                      LogDriver: "awslogs"
                      Options:
                          awslogs-create-group: true
                          awslogs-group: !Sub ${ApplicationName}-${EnvName}
                          awslogs-region: !Ref "AWS::Region"
                          awslogs-stream-prefix: ecs

    LarkTopic:
        Type: AWS::SNS::Topic
        Properties:
            TopicName: !Sub ${ApplicationName}-${EnvName}
            Subscription:
                - Endpoint: !Ref SnsToLarkLambda
                  Protocol: "LAMBDA"

        # ASG setting begin
    AutoScalingRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: "2012-10-17"
                Statement:
                    - Effect: Allow
                      Principal:
                          Service:
                              - ecs-tasks.amazonaws.com
                      Action:
                          - "sts:AssumeRole"
            Path: "/"
            Policies:
                - PolicyName: allow-ecs-cw-scaling
                  PolicyDocument:
                      Version: "2012-10-17"
                      Statement:
                          - Effect: Allow
                            Action:
                                - ecs:DescribeServices
                                - ecs:UpdateService
                                - cloudwatch:DeleteAlarms
                                - cloudwatch:DescribeAlarms
                                - cloudwatch:PutMetricAlarm
                            Resource: "*"
    AutoScalingTarget:
        Type: AWS::ApplicationAutoScaling::ScalableTarget
        Properties:
            MinCapacity: !Ref TaskDesiredCount
            MaxCapacity: 10
            ResourceId:
                !Join [
                    "/",
                    [service, !Ref ECSClusterName, !GetAtt ECSService.Name],
                ]
            ScalableDimension: ecs:service:DesiredCount
            ServiceNamespace: ecs
            RoleARN: !GetAtt AutoScalingRole.Arn
    AutoScalingPolicyForCPU:
        Type: AWS::ApplicationAutoScaling::ScalingPolicy
        Properties:
            PolicyName: ecs-cpu-utilization-ScalingPolicy
            PolicyType: TargetTrackingScaling
            ScalingTargetId: !Ref AutoScalingTarget
            TargetTrackingScalingPolicyConfiguration:
                PredefinedMetricSpecification:
                    PredefinedMetricType: ECSServiceAverageCPUUtilization
                ScaleInCooldown: 300
                ScaleOutCooldown: 120
                TargetValue: 70.0
    AutoScalingPolicyForMemory:
        Type: AWS::ApplicationAutoScaling::ScalingPolicy
        Properties:
            PolicyName: ecs-memory-utilization-ScalingPolicy
            PolicyType: TargetTrackingScaling
            ScalingTargetId: !Ref AutoScalingTarget
            TargetTrackingScalingPolicyConfiguration:
                PredefinedMetricSpecification:
                    PredefinedMetricType: ECSServiceAverageMemoryUtilization
                ScaleInCooldown: 300
                ScaleOutCooldown: 120
                TargetValue: 75.0

    TooManyHttpCodeElb5XXCountAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm of ${ApplicationName} in environment ${EnvName}"
            Namespace: AWS/ApplicationELB
            MetricName: HTTPCode_ELB_5XX_Count
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt InternalLoadBalancer.LoadBalancerFullName
            Statistic: Sum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    TargetResponseTimeTooSlowAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "TargetResponseTime-too-slow-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "TargetResponseTime is too slow for ${ApplicationName} in environment ${EnvName}"
            Namespace: AWS/ApplicationELB
            MetricName: TargetResponseTime
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt InternalLoadBalancer.LoadBalancerFullName
            Statistic: Maximum
            Period: 600
            EvaluationPeriods: 1
            Threshold: 10
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

    HealthyHostCountTooLowAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub "HealthyHostCountTooLow-alarm-${EnvName}-${ApplicationName}"
            AlarmDescription: !Sub "The HealthyHostCount is too low for ${ApplicationName} in environment ${EnvName}"
            Namespace: AWS/ApplicationELB
            MetricName: HealthyHostCount
            Dimensions:
                - Name: LoadBalancer
                  Value: !GetAtt InternalLoadBalancer.LoadBalancerFullName
                - Name: TargetGroup
                  Value: !GetAtt InternalTargetGroup.TargetGroupFullName
            Statistic: Minimum
            Period: 180
            EvaluationPeriods: 1
            Threshold: !Ref TaskDesiredCount
            ComparisonOperator: LessThanThreshold
            TreatMissingData: breaching
            AlarmActions:
                - !Ref LarkTopic
            OKActions:
                - !Ref LarkTopic

# ASG setting end

Outputs:
    ClusterName:
        Description: The cluster used to create the service.
        Value: !Ref ECSClusterName
    ECSService:
        Description: The created service.
        Value: !Ref ECSService
    InternalLoadBalancer:
        Description: The created load balancer.
        Value: !Ref InternalLoadBalancer
    InternalListener:
        Description: The created listener.
        Value: !Ref InternalListener
    InternalTargetGroup:
        Description: The created target group.
        Value: !Ref InternalTargetGroup
    LarkTopic:
        Description: The created Lark Topic.
        Value: !Ref LarkTopic
