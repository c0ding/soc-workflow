AWSTemplateFormatVersion: 2010-09-09
Description: The template used to create an ECS Service.
Parameters:
  CertificateArn:
    Type: AWS::SSM::Parameter::Value<AWS::CertificateManager::Certificate::ARN>
  ExecutionRoleArn:
    Type: AWS::SSM::Parameter::Value<AWS::IAM::Role::ARN>
  ECSClusterName:
    Type: String
  ApplicationName:
    Type: String
  EnvName:
    Type: String
  SecurityGroupIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::SecurityGroup::Id>>
  SubnetIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
  VpcID:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
  DockerImageUrl:
    Type: String
  TaskDesiredCount:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ecs/taskcount
  TaskCpuSetting:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ecs/go/TaskCpu
  TaskMemorySetting:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ecs/go/TaskMemory
  AppPort:
    Type: Number
    Default: 3200
  SnsToLarkLambda:
    Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
  ContainerEnvConfig:
    Type: String
  Mysql:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_DATABASE_URL_OF_ADMIN
  Redis:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/REDIS_URL_OF_ADMIN
  JwtSecret:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/JWT_SECRET
  JwtExpiresIn:
    Type: String
    Default: 7d
  MysqlOfWeb2:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_OF_WEB2
  PostBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/POST_BASE_URL
  ImBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/IM_BASE_URL
  UserBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/USER_BASE_URL
  AwsAcccessKeyId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/AWS_ACCESS_KEY_ID
  AwsSecretAccessKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/AWS_SECRET_ACCESS_KEY
  AwsBucketName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/AWS_BUCKET_NAME
  AwsRegion:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/AWS_REGION
  AdminInternalBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/ADMIN_INTERNAL_BASE_URL
  WalletActqaBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WALLET_ACTQA_BASE_URL
  WalletActqaApiKyey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WALLET_ACTQA_API_KEY
  LarkWebhookHost:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/LARK_WEBHOOK_HOST
  LarkWebhookAdminMonitorUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/LARK_WEBHOOK_ADMIN_MONITOR_URL
  SwitchLarkWebhook:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/SWITCH_LARK_WEBHOOK
  Web25NotiBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB25_NOTIFICATION_BASE_URL
  Web3ApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB3_APIKEY
  Web3BaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB3_BASE_URL
  MysqlWeb2Saipan:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_OF_WEB2_SOC_SAIPAN_READ
  MysqlWeb2User:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_OF_WEB2_NEXT_USER_READ
  MysqlWeb2Post:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_OF_WEB2_NEXT_POST_READ
  VideoUrlKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/VIDEO_GEN_TYPE_URL_PRIMARY_KEY
  VideoHost:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/VIDEO_HOST
  VideoCoverHost:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/VIDEO_COVER_HOST
  Web25ApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB25_APIKEY
  Web3InBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB3_INTERNAL_BASE_URL
  Web3InApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB3_INTERNAL_API_KEY
  MysqlOfWeb3WalletConRead:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_OF_WEB3_WALLET_CONFIG_READ
  MysqlOfWeb3NftMarketRead:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_OF_WEB3_NFT_MARKET_READ
  MysqlOfWeb3Uni4Read:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/MYSQL_OF_WEB3_UNI4_EXCHANGE_READ
  Web2BaliInBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB2_BALI_INTERNAL_BASE_URL
  Web3TokenBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB3_TOKEN_BASE_URL
  Web3TokenApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB3_TOKEN_APIKEY
  Web3TokenPriceBaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/WEB3_TOKEN_PRICE_BASE_URL
  MysqlOfWeb3MemePublishRead:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WEB3_MEME_PUBLISH_READ
  MYSQLOFWEB3FACEREAD:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WEB3_FACE_READ
  MysqlOfWeb2GuamRead:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WEB2_SOC_GUAM_READ
  KafkaBrokers:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-be/KAFKA_BROKERS
  MysqlOfNfcRead:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /node-for-clien/DB_NFC
  ESNODE:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /node-for-clien/ES_NFC_NODE
  ESPASSWORD:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /node-for-clien/ES_NFC_PASSWORD
  ESUSERNAME:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /node-for-clien/ES_NFC_USERNAME
  MYSQLOFWEB3MALLREAD:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /node-for-clien/MYSQL_OF_WEB3_MALL_READ
  MYSQLOFWEB3PREDICTIONMARKETREAD:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WEB3_PREDICTION_MARKET_READ
  DVMBASEURL:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/DVM_BASE_URL
  DVMAPIKEY:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/DVM_API_KEY
  MysqlOfWeb2PmRedshift:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WEB2_PREDICTION_MARKET_REDSHIFT
  MysqlOfWeb2UserRedshift:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WEB2_NEXT_USER_REDSHIFT
  MysqlOfWeb2PMRankings:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WEB2_PREDICTION_MARKET_RANKINGS
  KafkaUserName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_USERNAME
  KafkaPassword:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_PASSWORD
  KafkaSecurityProtocol:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_SECURITY_PROTOCOL
  KafkaSaslMechanism:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_SASL_MECHANISM
  KafkaMessageEd25519PrivateKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/ENGINE_PRIVATE_KEY
  PredictionMarketApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/PREDICTION_MARKET_API_KEY
  MysqlOfWalletCoreRead:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /admin-mono/MYSQL_OF_WALLET_CORE_READ




Resources:
  ECSService:
    Type: "AWS::ECS::Service"
    Properties:
      Cluster: !Ref ECSClusterName
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Base: 0
          Weight: 1
      TaskDefinition: !Ref TaskDefinition
      ServiceName: !Sub ${ApplicationName}-${EnvName}
      DesiredCount: !Ref TaskDesiredCount
      EnableExecuteCommand: true
      LoadBalancers:
        - ContainerName: !Sub ${ApplicationName}-${EnvName}
          ContainerPort: !Ref AppPort
          TargetGroupArn: !Ref TargetGroup
        - ContainerName: !Sub ${ApplicationName}-${EnvName}
          ContainerPort: !Ref AppPort
          TargetGroupArn: !Ref InternalTargetGroup
      HealthCheckGracePeriodSeconds: "60"
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups: !Ref SecurityGroupIDs
          Subnets: !Ref SubnetIDs
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true    
          Rollback: true
      DeploymentController:
        Type: ECS
    DependsOn:
      - Listener
      - InternalListener
  LoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: !Sub ${ApplicationName}-${EnvName}-alb
      SecurityGroups: !Ref SecurityGroupIDs
      Subnets: !Ref SubnetIDs
      Type: application
  TargetGroup:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      VpcId: !Ref VpcID
      Protocol: HTTP
      Port: "443"
      HealthCheckPath: /v1/health
      TargetType: ip
  Listener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - TargetGroupArn: !Ref TargetGroup
          Type: forward
      LoadBalancerArn: !Ref LoadBalancer
      Port: "443"
      Protocol: HTTPS
  InternalLoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: !Sub ${ApplicationName}-${EnvName}-internal
      SecurityGroups: !Ref SecurityGroupIDs
      Subnets: !Ref SubnetIDs
      Type: application
      Scheme: internal

  InternalTargetGroup:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      VpcId: !Ref VpcID
      Protocol: HTTP
      Port: "80"
      HealthCheckPath: /health
      TargetType: ip

  InternalListener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref InternalTargetGroup
          Type: forward
      LoadBalancerArn: !Ref InternalLoadBalancer
      Port: "80"
      Protocol: HTTP

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ApplicationName}-${EnvName}
      Cpu: !Ref TaskCpuSetting
      Memory: !Ref TaskMemorySetting
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ExecutionRoleArn
      TaskRoleArn: !Ref ExecutionRoleArn
      ContainerDefinitions:
        - Name: !Sub ${ApplicationName}-${EnvName}
          Image: !Ref DockerImageUrl
          Environment:
            - Name: NODE_ENV
              Value: !Ref EnvName
            - Name: VIDEO_GEN_TYPE_URL_PRIMARY_KEY
              Value: !Ref VideoUrlKey
            - Name: VIDEO_HOST
              Value: !Ref VideoHost
            - Name: VIDEO_COVER_HOST
              Value: !Ref VideoCoverHost
            - Name: MYSQL_OF_WEB2_SOC_SAIPAN_READ
              Value: !Ref MysqlWeb2Saipan
            - Name: MYSQL_OF_WEB2_NEXT_USER_READ
              Value: !Ref MysqlWeb2User
            - Name: MYSQL_OF_WEB2_NEXT_POST_READ
              Value: !Ref MysqlWeb2Post
            - Name: MYSQL_OF_WEB2_NEXT_POST_WRITE
              Value: !Ref MysqlOfWeb2
            - Name: MYSQL_OF_ADMIN_BE
              Value: !Ref Mysql
            - Name: REDIS_OF_ADMIN_BE
              Value: !Ref Redis
            - Name: JWT_SECRET_OF_ADMIN_BE
              Value: !Ref JwtSecret
            - Name: AWS_ACCESS_KEY_ID
              Value: !Ref AwsAcccessKeyId
            - Name: AWS_SECRET_ACCESS_KEY
              Value: !Ref AwsSecretAccessKey
            - Name: AWS_BUCKET_NAME
              Value: !Ref AwsBucketName
            - Name: AWS_REGION
              Value: !Ref AwsRegion
            - Name: MYSQL_OF_WEB3_WALLET_CONFIG_READ
              Value: !Ref MysqlOfWeb3WalletConRead
            - Name: MYSQL_OF_WEB3_NFT_MARKET_READ
              Value: !Ref MysqlOfWeb3NftMarketRead
            - Name: MYSQL_OF_WEB3_UNI4_EXCHANGE_READ
              Value: !Ref MysqlOfWeb3Uni4Read
            - Name: MYSQL_OF_WEB3_MEME_PUBLISH_READ
              Value: !Ref MysqlOfWeb3MemePublishRead
            - Name: MYSQL_OF_WEB3_FACE_READ
              Value: !Ref MYSQLOFWEB3FACEREAD
            - Name: MYSQL_OF_WEB2_SOC_GUAM_READ
              Value: !Ref MysqlOfWeb2GuamRead
            - Name: KAFKA_BROKERS
              Value: !Ref KafkaBrokers
            - Name: MYSQL_OF_NFC_READ
              Value: !Ref MysqlOfNfcRead
            - Name: ES_NODE
              Value: !Ref ESNODE
            - Name: ES_PASSWORD
              Value: !Ref ESPASSWORD
            - Name: ES_USERNAME
              Value: !Ref ESUSERNAME
            - Name: MYSQL_OF_WEB3_MALL_READ
              Value: !Ref MYSQLOFWEB3MALLREAD
            - Name: MYSQL_OF_WEB3_PREDICTION_MARKET_READ
              Value: !Ref MYSQLOFWEB3PREDICTIONMARKETREAD
            - Name: DVM_BASE_URL
              Value: !Ref DVMBASEURL
            - Name: DVM_API_KEY
              Value: !Ref DVMAPIKEY
            - Name: MYSQL_OF_WEB2_PREDICTION_MARKET_REDSHIFT
              Value: !Ref MysqlOfWeb2PmRedshift
            - Name: MYSQL_OF_WEB2_PREDICTION_MARKET_RANKINGS
              Value: !Ref MysqlOfWeb2PMRankings
            - Name: KAFKA_USERNAME
              Value: !Ref KafkaUserName
            - Name: KAFKA_PASSWORD
              Value: !Ref KafkaPassword
            - Name: KAFKA_SECURITY_PROTOCOL
              Value: !Ref KafkaSecurityProtocol
            - Name: KAFKA_SASL_MECHANISM
              Value: !Ref KafkaSaslMechanism
            - Name: KAFKA_MESSAGE_ED25519_PRIVATE_KEY
              Value: !Ref KafkaMessageEd25519PrivateKey
            - Name: PREDICTION_MARKET_API_KEY
              Value: !Ref PredictionMarketApiKey
            - Name: MYSQL_OF_WEB2_NEXT_USER_REDSHIFT
              Value: !Ref MysqlOfWeb2UserRedshift
            - Name: MYSQL_OF_WALLET_CORE_READ
              Value: !Ref MysqlOfWalletCoreRead




          PortMappings:
            - ContainerPort: !Ref AppPort
              HostPort: !Ref AppPort
          LogConfiguration:
            LogDriver: "awslogs"
            Options:
              awslogs-create-group: true
              awslogs-group: !Sub ${ApplicationName}-${EnvName}
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs

  LarkTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ApplicationName}-${EnvName}
      Subscription:
        - Endpoint: !Ref SnsToLarkLambda
          Protocol: "LAMBDA"

    # ASG setting begin
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: allow-ecs-cw-scaling
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:UpdateService
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                Resource: "*"
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref TaskDesiredCount
      MaxCapacity: 10
      ResourceId:
        !Join ["/", [service, !Ref ECSClusterName, !GetAtt ECSService.Name]]
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn
  AutoScalingPolicyForCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-cpu-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 70.0
  AutoScalingPolicyForMemory:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-memory-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 75.0

  TooManyHttpCodeElb5XXCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm of ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  TargetResponseTimeTooSlowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TargetResponseTime-too-slow-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "TargetResponseTime is too slow for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Maximum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  HealthyHostCountTooLowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "HealthyHostCountTooLow-alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "The HealthyHostCount is too low for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt TargetGroup.TargetGroupFullName
      Statistic: Minimum
      Period: 180
      EvaluationPeriods: 1
      Threshold: !Ref TaskDesiredCount
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

# ASG setting end

Outputs:
  ClusterName:
    Description: The cluster used to create the service.
    Value: !Ref ECSClusterName
  ECSService:
    Description: The created service.
    Value: !Ref ECSService
  LoadBalancer:
    Description: The created load balancer.
    Value: !Ref LoadBalancer
  Listener:
    Description: The created listener.
    Value: !Ref Listener
  TargetGroup:
    Description: The created target group.
    Value: !Ref TargetGroup
  LarkTopic:
    Description: The created Lark Topic.
    Value: !Ref LarkTopic
