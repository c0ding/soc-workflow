AWSTemplateFormatVersion: 2010-09-09
Description: The template used to create an ECS Service.
Parameters:
  CertificateArn:
    Type: AWS::SSM::Parameter::Value<AWS::CertificateManager::Certificate::ARN>
  ExecutionRoleArn:
    Type: AWS::SSM::Parameter::Value<AWS::IAM::Role::ARN>
  ECSClusterName:
    Type: String
  ApplicationName:
    Type: String
  EnvName:
    Type: String
  SecurityGroupIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::SecurityGroup::Id>>
  SubnetIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
  VpcID:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
  DockerImageUrl:
    Type: String
  TaskDesiredCount:
    Type: Number
    Default: 1
  TaskCpuSetting:
    Type: Number
    Default: 2048
  TaskMemorySetting:
    Type: Number
    Default: 4096
  AppPort:
    Type: Number
    Default: 10031
  SnsToLarkLambda:
    Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
  MysqlUser:
    Type: AWS::SSM::Parameter::Value<String>
  MysqlPassword:
    Type: AWS::SSM::Parameter::Value<String>
  RedshiftUsername:
    Type: AWS::SSM::Parameter::Value<String>
  RedshiftPassword:
    Type: AWS::SSM::Parameter::Value<String>
  RedisPassword:
    Type: AWS::SSM::Parameter::Value<String>
  JavaToolOptions:
    Type: AWS::SSM::Parameter::Value<String>
  SpringProfilingActive:
    Type: AWS::SSM::Parameter::Value<String>
  NacosName:
    Type: AWS::SSM::Parameter::Value<String>
  NacosPassword:
    Type: AWS::SSM::Parameter::Value<String>
  AwsAccessKeyId:
    Type: AWS::SSM::Parameter::Value<String>
  AwsSecretAccessKey:
    Type: AWS::SSM::Parameter::Value<String>
  NfpXApi:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /backend/NFP_X_API
  KafkaUserName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_USERNAME
  KafkaPassword:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_PASSWORD
  KafkaSecurityProtocol:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_SECURITY_PROTOCOL
  KafkaSaslMechanism:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_SASL_MECHANISM

Resources:
  ECSService:
    Type: 'AWS::ECS::Service'
    Properties:
      Cluster: !Ref ECSClusterName
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Base: 0
          Weight: 1
      TaskDefinition: !Ref TaskDefinition
      ServiceName: !Sub ${ApplicationName}-${EnvName}
      DesiredCount: !Ref TaskDesiredCount
      EnableExecuteCommand: true
      LoadBalancers:
        - ContainerName: !Sub ${ApplicationName}-${EnvName}
          ContainerPort: !Ref AppPort
          TargetGroupArn: !Ref InternetTargetGroup
      HealthCheckGracePeriodSeconds: '60'
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups: !Ref SecurityGroupIDs
          Subnets: !Ref SubnetIDs
      DeploymentConfiguration:
        # 200 Quick but maybe the service will stop
        # 125 Want to update services healthier
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true    
          Rollback: true
      DeploymentController:
        Type: ECS
    DependsOn: 
      - InternetListener
      

  InternetLoadBalancer:
    Type: "AWS::ElasticLoadBalancingV2::LoadBalancer"
    Properties:
      Name: !Sub ${ApplicationName}-${EnvName}-alb
      SecurityGroups: !Ref SecurityGroupIDs
      Subnets: !Ref SubnetIDs
      Type: application
  InternetTargetGroup:
    Type: "AWS::ElasticLoadBalancingV2::TargetGroup"
    Properties:
      VpcId: !Ref VpcID
      Protocol: HTTP
      Port: "443"
      HealthCheckPath: /actuator/health/liveness
      TargetType: ip
  InternetListener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Properties:
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - TargetGroupArn: !Ref InternetTargetGroup
          Type: forward
      LoadBalancerArn: !Ref InternetLoadBalancer
      Port: "443"
      Protocol: HTTPS

  
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ApplicationName}-${EnvName}
      Cpu: !Ref TaskCpuSetting
      Memory: !Ref TaskMemorySetting
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ExecutionRoleArn
      TaskRoleArn: !Ref ExecutionRoleArn
      ContainerDefinitions:
        - Name: !Sub ${ApplicationName}-${EnvName}
          Image: !Ref DockerImageUrl
          Environment:
            - Name: MYSQL_USER
              Value: !Ref MysqlUser
            - Name: MYSQL_PASSWORD
              Value: !Ref MysqlPassword
            - Name: REDIS_PASSWORD
              Value: !Ref RedisPassword
            - Name: REDSHIFT_USERNAME
              Value: !Ref RedshiftUsername
            - Name: REDSHIFT_PASSWORD
              Value: !Ref RedshiftPassword
            - Name: JAVA_TOOL_OPTIONS
              Value: !Ref JavaToolOptions
            - Name: SPRING_PROFILES_ACTIVE
              Value: !Ref SpringProfilingActive
            - Name: NACOS_NAME
              Value: !Ref NacosName
            - Name: NACOS_PASSWORD
              Value: !Ref NacosPassword
            - Name: AWS_ACCESS_KEY_ID
              Value: !Ref AwsAccessKeyId
            - Name: AWS_SECRET_ACCESS_KEY
              Value: !Ref AwsSecretAccessKey
            - Name: NFP_X_API
              Value: !Ref NfpXApi
            - Name: KAFKA_USERNAME
              Value: !Ref KafkaUserName
            - Name: KAFKA_PASSWORD
              Value: !Ref KafkaPassword
            - Name: KAFKA_SECURITY_PROTOCOL
              Value: !Ref KafkaSecurityProtocol
            - Name: KAFKA_SASL_MECHANISM
              Value: !Ref KafkaSaslMechanism


          PortMappings:
            - ContainerPort: !Ref AppPort
              HostPort: !Ref AppPort
          LogConfiguration:
            LogDriver: "awslogs"
            Options:
              awslogs-create-group: true
              awslogs-group: !Sub ${ApplicationName}-${EnvName}
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs

  TooManyHttpCodeElb5XXCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm of ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt InternetLoadBalancer.LoadBalancerFullName  # 修复这里
      Statistic: Sum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  TargetResponseTimeTooSlowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TargetResponseTime-too-slow-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "TargetResponseTime is too slow for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt InternetLoadBalancer.LoadBalancerFullName  # 修复这里
      Statistic: Maximum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  HealthyHostCountTooLowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "HealthyHostCountTooLow-alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "The HealthyHostCount is too low for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt InternetLoadBalancer.LoadBalancerFullName  # 修复这里
        - Name: TargetGroup
          Value: !GetAtt InternetTargetGroup.TargetGroupFullName  # 修复这里
      Statistic: Minimum
      Period: 180
      EvaluationPeriods: 1
      Threshold: !Ref TaskDesiredCount
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  

  LarkTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ApplicationName}-${EnvName}
      Subscription:
        - Endpoint: !Ref SnsToLarkLambda
          Protocol: "LAMBDA"


  # ASG setting begin
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: '/'
      Policies:
        - PolicyName: allow-ecs-cw-scaling
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:UpdateService
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                Resource: '*'
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref TaskDesiredCount
      MaxCapacity: 2
      ResourceId: !Join [ "/", [ service, !Ref ECSClusterName, !GetAtt ECSService.Name ] ]
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn
  AutoScalingPolicyForCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-cpu-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 70.0
  AutoScalingPolicyForMemory:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-memory-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 85.0
# ASG setting end

Outputs:
  ClusterName:
    Description: The cluster used to create the service.
    Value: !Ref ECSClusterName
  ECSService:
    Description: The created service.
    Value: !Ref ECSService
  LoadBalancer:
    Description: The created load balancer.
    Value: !Ref InternetLoadBalancer  # 修复这里
  Listener:
    Description: The created listener.
    Value: !Ref InternetListener  # 修复这里
  TargetGroup:
    Description: The created target group.
    Value: !Ref InternetTargetGroup  # 修复这里
  LarkTopic:
    Description: The created Lark Topic.
    Value: !Ref LarkTopic
