AWSTemplateFormatVersion: 2010-09-09
Description: The template used to create an ECS Service.
Parameters:
  CertificateArn:
    Type: AWS::SSM::Parameter::Value<AWS::CertificateManager::Certificate::ARN>
  ExecutionRoleArn:
    Type: AWS::SSM::Parameter::Value<AWS::IAM::Role::ARN>
  ECSClusterName:
    Type: String
  ApplicationName:
    Type: String
  EnvName:
    Type: String
  SecurityGroupIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::SecurityGroup::Id>>
  SubnetIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
  VpcID:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
  DockerImageUrl:
    Type: String
  TaskDesiredCount:
    Type: Number
    Default: 1
  TaskCpuSetting:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ecs/go/TaskCpu
  TaskMemorySetting:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /ecs/go/TaskMemory
  AppPort:
    Type: Number
    Default: 3000
  SnsToLarkLambda:
    Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
  ContainerEnvConfig:
    Type: String
  RedisUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfp/REDIS_URL
  KafkaBrokers:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfp/KAFKA_BROKERS_New
  DatabaseUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/DATABASE_URL
  PythAccessToken:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/PYTH_ACCESS_TOKEN
  KafkaUserName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_USERNAME
  KafkaPassword:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_PASSWORD
  KafkaSecurityProtocol:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_SECURITY_PROTOCOL
  KafkaSaslMechanism:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/KAFKA_SASL_MECHANISM
  ChainlinkApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/CHAINLINK_API_KEY
  ChainlinkUserSecret:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/CHAINLINK_USER_SECRET
  ChainlinkEndpoint:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/CHAINLINK_ENDPOINT
  ChainlinkWsEndpoint:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/CHAINLINK_WS_ENDPOINT
  ChainlinkHaMode:
    Type: String
    Default: 'False'
  DeribitClientId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/DERIBIT_CLIENT_ID
  DeribitClientSecret:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/DERIBIT_CLIENT_SECRET
  CentrifugeUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /nfms/CENTRIFUGE_URL
  CentrifugeApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /pme/SOC_CENTRIFUGO_APIKEY

Resources:
  ECSService:
    Type: 'AWS::ECS::Service'
    Properties:
      Cluster: !Ref ECSClusterName
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Base: 0
          Weight: 1
      TaskDefinition: !Ref TaskDefinition
      ServiceName: !Sub ${ApplicationName}-${EnvName}
      DesiredCount: !Ref TaskDesiredCount
      EnableExecuteCommand: true
      LoadBalancers:
        - ContainerName: !Sub ${ApplicationName}-${EnvName}
          ContainerPort: !Ref AppPort
          TargetGroupArn: !Ref TargetGroup

      HealthCheckGracePeriodSeconds: '60'
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups: !Ref SecurityGroupIDs
          Subnets: !Ref SubnetIDs
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true    
          Rollback: true
      DeploymentController:
        Type: ECS
    DependsOn:
      - Listener

  LoadBalancer:
    Type: 'AWS::ElasticLoadBalancingV2::LoadBalancer'
    Properties:
      Name: !Sub ${ApplicationName}-${EnvName}-alb
      SecurityGroups: !Ref SecurityGroupIDs
      Subnets: !Ref SubnetIDs
      Type: application
      Scheme: internal
  TargetGroup:
    Type: 'AWS::ElasticLoadBalancingV2::TargetGroup'
    Properties:
      VpcId: !Ref VpcID
      Protocol: HTTP
      Port: '443'
      HealthCheckPath: /api/nfms/health
      TargetType: ip
  Listener:
    Type: 'AWS::ElasticLoadBalancingV2::Listener'
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref TargetGroup
          Type: forward
      LoadBalancerArn: !Ref LoadBalancer
      Port: '80'
      Protocol: HTTP

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ApplicationName}-${EnvName}
      Cpu: !Ref TaskCpuSetting
      Memory: !Ref TaskMemorySetting
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ExecutionRoleArn
      TaskRoleArn: !Ref ExecutionRoleArn
      ContainerDefinitions:
        - Name: !Sub ${ApplicationName}-${EnvName}
          Image: !Ref DockerImageUrl
          Environment:
            - Name: KAFKA_BROKERS
              Value: !Ref KafkaBrokers
            - Name: DATABASE_URL
              Value: !Ref DatabaseUrl
            - Name: REDIS_URL
              Value: !Ref RedisUrl
            - Name: PYTH_ACCESS_TOKEN
              Value: !Ref PythAccessToken
            - Name: KAFKA_USERNAME
              Value: !Ref KafkaUserName
            - Name: KAFKA_PASSWORD
              Value: !Ref KafkaPassword
            - Name: KAFKA_SECURITY_PROTOCOL
              Value: !Ref KafkaSecurityProtocol
            - Name: KAFKA_SASL_MECHANISM
              Value: !Ref KafkaSaslMechanism
            - Name: CHAINLINK_API_KEY
              Value: !Ref ChainlinkApiKey
            - Name: CHAINLINK_USER_SECRET
              Value: !Ref ChainlinkUserSecret
            - Name: CHAINLINK_ENDPOINT
              Value: !Ref ChainlinkEndpoint
            - Name: CHAINLINK_WS_ENDPOINT
              Value: !Ref ChainlinkWsEndpoint
            - Name: CHAINLINK_HA_MODE
              Value: !Ref ChainlinkHaMode
            - Name: DERIBIT_CLIENT_ID
              Value: !Ref DeribitClientId
            - Name: DERIBIT_CLIENT_SECRET
              Value: !Ref DeribitClientSecret
            - Name: CENTRIFUGE_URL
              Value: !Ref CentrifugeUrl
            - Name: CENTRIFUGE_API_KEY
              Value: !Ref CentrifugeApiKey

          PortMappings:
            - ContainerPort: !Ref AppPort
              HostPort: !Ref AppPort

          LogConfiguration:
            LogDriver: 'awslogs'
            Options:
              awslogs-create-group: true
              awslogs-group: !Sub ${ApplicationName}-${EnvName}
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: ecs

  TooManyHttpCodeElb5XXCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'TooMany_HTTPCode_ELB_5XX_Count_Alarm-${EnvName}-${ApplicationName}'
      AlarmDescription: !Sub 'TooMany_HTTPCode_ELB_5XX_Count_Alarm of ${ApplicationName} in environment ${EnvName}'
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  TargetResponseTimeTooSlowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'TargetResponseTime-too-slow-${EnvName}-${ApplicationName}'
      AlarmDescription: !Sub 'TargetResponseTime is too slow for ${ApplicationName} in environment ${EnvName}'
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Maximum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  HealthyHostCountTooLowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'HealthyHostCountTooLow-alarm-${EnvName}-${ApplicationName}'
      AlarmDescription: !Sub 'The HealthyHostCount is too low for ${ApplicationName} in environment ${EnvName}'
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt TargetGroup.TargetGroupFullName
      Statistic: Minimum
      Period: 180
      EvaluationPeriods: 1
      Threshold: !Ref TaskDesiredCount
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  LarkTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ApplicationName}-${EnvName}
      Subscription:
        - Endpoint: !Ref SnsToLarkLambda
          Protocol: 'LAMBDA'

  # ASG setting begin
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: '/'
      Policies:
        - PolicyName: allow-ecs-cw-scaling
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:UpdateService
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                Resource: '*'
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref TaskDesiredCount
      MaxCapacity: 10
      ResourceId: !Join ['/', [service, !Ref ECSClusterName, !GetAtt ECSService.Name]]
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn
  AutoScalingPolicyForCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-cpu-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 70.0
  AutoScalingPolicyForMemory:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-memory-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 75.0
# ASG setting end

Outputs:
  ClusterName:
    Description: The cluster used to create the service.
    Value: !Ref ECSClusterName
  ECSService:
    Description: The created service.
    Value: !Ref ECSService
  LoadBalancer:
    Description: The created load balancer.
    Value: !Ref LoadBalancer
  Listener:
    Description: The created listener.
    Value: !Ref Listener
  TargetGroup:
    Description: The created target group.
    Value: !Ref TargetGroup
  LarkTopic:
    Description: The created Lark Topic.
    Value: !Ref LarkTopic
