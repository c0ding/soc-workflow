AWSTemplateFormatVersion: 2010-09-09
Description: The template used to create Centrifugo ECS Service.

Parameters:
  CertificateArn:
    Type: AWS::SSM::Parameter::Value<AWS::CertificateManager::Certificate::ARN>
  ExecutionRoleArn:
    Type: AWS::SSM::Parameter::Value<AWS::IAM::Role::ARN>
  ECSClusterName:
    Type: String
  ApplicationName:
    Type: String
  EnvName:
    Type: String
  SecurityGroupIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::SecurityGroup::Id>>
  SubnetIDs:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
  VpcID:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
  DockerImageUrl:
    Type: String
  TaskDesiredCount:
    Type: Number
    Default: 2
  TaskCpuSetting:
    Type: Number
    Default: 1024
  TaskMemorySetting:
    Type: Number
    Default: 2048
  AppPort:
    Type: Number
    Default: 8000
  SnsToLarkLambda:
    Type: AWS::SSM::Parameter::Value<AWS::Lambda::ARN>
  # Centrifugo配置参数
  CentrifugoTokenSecretKeyPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/centrifugo/staging/token-secret-key"
  CentrifugoAdminPasswordPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/centrifugo/staging/admin-password"
  CentrifugoAdminSecretPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/centrifugo/staging/admin-secret"
  CentrifugoHttpApiKeyPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/centrifugo/staging/http-api-key"
  RedisEndpointPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/centrifugo/staging/redis-endpoint-new"
  RedisPortPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/centrifugo/staging/redis-port"
  RedisPasswordPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: "/centrifugo/staging/redis-password"

Resources:
  ECSService:
    Type: 'AWS::ECS::Service'
    Properties:
      Cluster: !Ref ECSClusterName
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Base: 0
          Weight: 1
      TaskDefinition: !Ref TaskDefinition
      ServiceName: !Sub ${ApplicationName}-${EnvName}
      DesiredCount: !Ref TaskDesiredCount
      EnableExecuteCommand: true
      LoadBalancers:
        - ContainerName: !Sub ${ApplicationName}-${EnvName}
          ContainerPort: !Ref AppPort
          TargetGroupArn: !Ref TargetGroup
        - ContainerName: !Sub ${ApplicationName}-${EnvName}
          ContainerPort: !Ref AppPort
          TargetGroupArn: !Ref InternalTargetGroup
      HealthCheckGracePeriodSeconds: 180
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups: !Ref SecurityGroupIDs
          Subnets: !Ref SubnetIDs
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true    
          Rollback: true
      DeploymentController:
        Type: ECS
    DependsOn: 
        - HttpsListener
        - InternalListener

  InternalLoadBalancer:
    Type: 'AWS::ElasticLoadBalancingV2::LoadBalancer'
    Properties:
      Name: !Sub ${ApplicationName}-${EnvName}-pri-alb
      SecurityGroups: !Ref SecurityGroupIDs
      Subnets: !Ref SubnetIDs
      Type: application
      Scheme: internal
  InternalTargetGroup:
    Type: 'AWS::ElasticLoadBalancingV2::TargetGroup'
    Properties:
      VpcId: !Ref VpcID
      Protocol: HTTP
      Port: '443'
      HealthCheckPath: /
      TargetType: ip
  InternalListener:
    Type: 'AWS::ElasticLoadBalancingV2::Listener'
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref InternalTargetGroup
          Type: forward
      LoadBalancerArn: !Ref InternalLoadBalancer
      Port: '80'
      Protocol: HTTP      

  LoadBalancer:
    Type: 'AWS::ElasticLoadBalancingV2::LoadBalancer'
    Properties:
      Name: !Sub ${ApplicationName}-${EnvName}-alb
      SecurityGroups: !Ref SecurityGroupIDs
      Subnets: !Ref SubnetIDs
      Type: application
      Scheme: internet-facing

  TargetGroup:
    Type: 'AWS::ElasticLoadBalancingV2::TargetGroup'
    Properties:
      Name: !Sub ${ApplicationName}-${EnvName}-tg
      VpcId: !Ref VpcID
      Protocol: HTTP
      Port: !Ref AppPort
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetType: ip


  HttpsListener:
    Type: 'AWS::ElasticLoadBalancingV2::Listener'
    Properties:
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - TargetGroupArn: !Ref TargetGroup
          Type: forward
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ApplicationName}-${EnvName}
      Cpu: !Ref TaskCpuSetting
      Memory: !Ref TaskMemorySetting
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ExecutionRoleArn
      TaskRoleArn: !Ref ExecutionRoleArn  # 使用同一个Role
      ContainerDefinitions:
        - Name: !Sub ${ApplicationName}-${EnvName}
          Image: !Ref DockerImageUrl
          Essential: true
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: ENV_NAME
              Value: !Ref EnvName
            # Centrifugo配置参数路径
            - Name: CENTRIFUGO_TOKEN_SECRET_KEY_SSM
              Value: "/centrifugo/staging/token-secret-key"
            - Name: CENTRIFUGO_ADMIN_PASSWORD_SSM
              Value: "/centrifugo/staging/admin-password"
            - Name: CENTRIFUGO_ADMIN_SECRET_SSM
              Value: "/centrifugo/staging/admin-secret"
            - Name: CENTRIFUGO_HTTP_API_KEY_SSM
              Value: "/centrifugo/staging/http-api-key"
            - Name: REDIS_ENDPOINT_SSM
              Value: "/centrifugo/staging/redis-endpoint-new"
            - Name: REDIS_PORT_SSM
              Value: "/centrifugo/staging/redis-port"
            - Name: REDIS_PASSWORD_SSM
              Value: "/centrifugo/staging/redis-password"
          PortMappings:
            - ContainerPort: !Ref AppPort
              HostPort: !Ref AppPort
          LogConfiguration:
            LogDriver: "awslogs"
            Options:
              awslogs-create-group: true
              awslogs-group: !Sub ${ApplicationName}-${EnvName}
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs
          

  # Monitoring Alarms (保持不变)
  TooManyHttpCodeElb5XXCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "TooMany_HTTPCode_ELB_5XX_Count_Alarm of ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  TargetResponseTimeTooSlowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "TargetResponseTime-too-slow-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "TargetResponseTime is too slow for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Maximum
      Period: 600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  HealthyHostCountTooLowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "HealthyHostCountTooLow-alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "The HealthyHostCount is too low for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt TargetGroup.TargetGroupFullName
      Statistic: Minimum
      Period: 180
      EvaluationPeriods: 1
      Threshold: !Ref TaskDesiredCount
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  CentrifugoConnectionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Centrifugo-Connection-Error-alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "Centrifugo connection error alarm for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Sub ${ApplicationName}-${EnvName}
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 90
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  RedisConnectionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "Redis-Connection-Error-alarm-${EnvName}-${ApplicationName}"
      AlarmDescription: !Sub "Redis connection error alarm for ${ApplicationName} in environment ${EnvName}"
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Sub ${ApplicationName}-${EnvName}
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 85
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref LarkTopic
      OKActions:
        - !Ref LarkTopic

  LarkTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ApplicationName}-${EnvName}
      Subscription:
        - Endpoint: !Ref SnsToLarkLambda
          Protocol: "lambda"

  # Auto Scaling Configuration
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - application-autoscaling.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: '/'
      Policies:
        - PolicyName: allow-ecs-cw-scaling
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:UpdateService
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                Resource: '*'

  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref TaskDesiredCount
      MaxCapacity: 10
      ResourceId: !Join ["/", [service, !Ref ECSClusterName, !GetAtt ECSService.Name]]
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn

  AutoScalingPolicyForCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-cpu-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 70.0

  AutoScalingPolicyForMemory:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ecs-memory-utilization-ScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 120
        TargetValue: 80.0

Outputs:
  ClusterName:
    Description: The cluster used to create the service.
    Value: !Ref ECSClusterName
  ECSService:
    Description: The created service.
    Value: !Ref ECSService
  LoadBalancer:
    Description: The created load balancer.
    Value: !Ref LoadBalancer
  LoadBalancerDNS:
    Description: The DNS name of the load balancer.
    Value: !GetAtt LoadBalancer.DNSName
  TargetGroup:
    Description: The created target group.
    Value: !Ref TargetGroup
  LarkTopic:
    Description: The created Lark Topic.
    Value: !Ref LarkTopic
