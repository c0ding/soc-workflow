name: staging-pm-order

on:
    repository_dispatch:
        types: [staging-pm-order]
    workflow_dispatch:
        inputs:
            task_desired_count:
                description: "任务数量"
                required: true
                default: "1"
                type: choice
                options:
                    - "0"
                    - "1"
                    - "2"
                    - "3"
            task_cpu_setting:
                description: "CPU设置"
                required: true
                default: "1024"
                type: choice
                options:
                    - "512" # 0.5 vCPU
                    - "1024" # 1 vCPU
                    - "2048" # 2 vCPU
                    - "4096" # 4 vCPU
                    - "8192" # 8 vCPU
                    - "16384" # 16 vCPU
            task_memory_setting:
                description: "内存设置"
                required: true
                default: "2048"
                type: choice
                options:
                    - "512" # 0.5 GB
                    - "1024" # 1 GB
                    - "2048" # 2 GB
                    - "4096" # 4 GB
                    - "8192" # 8 GB
                    - "16384" # 16 GB
                    - "24576" # 24 GB
                    - "32768" # 32 GB
                    - "65536" # 64 GB

jobs:
    call-deployment-in-local-repo:
        uses: ./.github/workflows/build-gradlew-task.yml
        with:
            CF: .github/workflows/awscf/pm-order.yml
            REPO_NAME: pm-order
            BRANCH_NAME: staging
            AWS_REGION: us-east-2
            ECR_REPOSITORY: pm-order
            DEPLOYMENT_ENV: staging
            APPLICATION_NAME: pm-order
            ECS_CLUSTER: prediction-market-staging
            SECURITY_GROUP_IDS_SSM: /staging/security-groups
            SUBNET_IDS_SSM: /staging/subnet-ids
            VPC_ID_SSM: /staging/vpc-id
            SNS_TO_LARK_LAMBDA_ARN: /staging/lambda/sns-to-lark
            CERERTIFICATE_US_EAST_2_ARN: /staging/certificate
            ECS_EXECUTION_ROLE_ARN: /staging/ecs-execution-role
            # 发布节点数量1
            TASK_DESIRED_COUNT: ${{ github.event.inputs.task_desired_count || '1' }}
            TASK_CPU_SETTING: ${{ github.event.inputs.task_cpu_setting || '2048' }}
            TASK_MEMORY_SETTING: ${{ github.event.inputs.task_memory_setting || '4096' }}
            JAVA_TOOL_OPT: /wallet/JAVA_TOOL_OPTIONS
            MYSQL_PASSWORD: /wallet/MYSQL_PASSWORD
            MYSQL_USER: /wallet/MYSQL_USER
            REDSHIFT_USERNAME: /wallet/REDSHIFT_USERNAME
            REDSHIFT_PASSWORD: /wallet/REDSHIFT_PASSWORD
            REDIS_PASSWORD: /wallet/REDIS_PASSWORD
            SPRING_PROFILES_ACTIVE: /wallet/SPRING_PROFILES_ACTIVE
            NACOS_NAME: /wallet/NACOS_NAME
            NACOS_PASSWORD: /wallet/NACOS_PASSWORD
            AWS_ACCESS_KEY_ID: /wallet/AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY: /wallet/AWS_SECRET_ACCESS_KEY
        secrets:
            DEPLOYMENT_AWS_ACCESS_KEY_ID: ${{ secrets.DEPLOYMENT_AWS_ACCESS_KEY_ID_STAGING }}
            DEPLOYMENT_AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOYMENT_AWS_SECRET_ACCESS_KEY_STAGING }}
            PAT: ${{ secrets.PAT }}
